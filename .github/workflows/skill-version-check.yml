name: Skill Version Check

on:
  pull_request:
    branches: [main]
    paths:
      - '*-skill/**'
      - '.github/workflows/skill-version-check.yml'
      - '.github/scripts/check-skill-versions.sh'

permissions:
  contents: read

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify skill versions were bumped
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/check-skill-versions.sh
