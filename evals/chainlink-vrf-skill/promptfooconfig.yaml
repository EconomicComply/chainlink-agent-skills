description: Chainlink VRF Skill Evaluation

prompts:
  - file://prompts/baseline.js
  - file://prompts/with-skill.js

providers:
  - id: "anthropic:messages:${PROMPTFOO_BASELINE_PROVIDER:-claude-sonnet-4-20250514}"
    label: baseline
    config:
      temperature: 0
      max_tokens: 4096
  - id: "anthropic:messages:${PROMPTFOO_WITH_SKILL_PROVIDER:-claude-sonnet-4-20250514}"
    label: with-skill
    config:
      temperature: 0
      max_tokens: 4096

commandLineOptions:
  maxConcurrency: 2

defaultTest:
  options:
    provider: "${PROMPTFOO_GRADER_PROVIDER:-openai:gpt-5-mini}"
  assert:
    - type: llm-rubric
      value: file://rubrics/must-pass.txt

# Reusable assertion sets
trigger_positive_asserts: &trigger_positive_asserts
  - type: llm-rubric
    value: file://rubrics/triggering-positive.txt

trigger_negative_asserts: &trigger_negative_asserts
  - type: llm-rubric
    value: file://rubrics/triggering-negative.txt

functional_asserts: &functional_asserts
  - type: llm-rubric
    value: file://rubrics/correctness.txt
  - type: llm-rubric
    value: file://rubrics/completeness.txt
  - type: llm-rubric
    value: file://rubrics/safety.txt
  - type: llm-rubric
    value: file://rubrics/freshness.txt
  - type: llm-rubric
    value: file://rubrics/clarification.txt

tests:
  # ── Functional: Subscription ──────────────────────────────────────────
  - vars:
      case_file: cases/functional/subscription-01.txt
      workflow: subscription
      requires_live_source: "yes"
    metadata:
      workflow: subscription
      category: functional
      smoke: true
    assert: *functional_asserts

  - vars:
      case_file: cases/functional/subscription-02.txt
      workflow: subscription
      requires_live_source: "no"
    metadata:
      workflow: subscription
      category: functional
      smoke: true
    assert: *functional_asserts

  # ── Functional: Direct Funding ────────────────────────────────────────
  - vars:
      case_file: cases/functional/direct-funding-01.txt
      workflow: direct-funding
      requires_live_source: "yes"
    metadata:
      workflow: direct-funding
      category: functional
      smoke: true
    assert: *functional_asserts

  # ── Functional: Migration ─────────────────────────────────────────────
  - vars:
      case_file: cases/functional/migration-01.txt
      workflow: migration
      requires_live_source: "no"
    metadata:
      workflow: migration
      category: functional
      smoke: true
    assert: *functional_asserts

  # ── Trigger Positive ─────────────────────────────────────────────────
  - vars:
      case_file: cases/trigger-positive/subscription-01.txt
      workflow: subscription
      expected_trigger: "yes"
    metadata:
      workflow: subscription
      category: trigger-positive
      smoke: true
    assert: *trigger_positive_asserts

  - vars:
      case_file: cases/trigger-positive/legacy-trap-01.txt
      workflow: migration
      expected_trigger: "yes"
    metadata:
      workflow: migration
      category: trigger-positive
      smoke: true
    assert: *trigger_positive_asserts

  # ── Trigger Negative ─────────────────────────────────────────────────
  - vars:
      case_file: cases/trigger-negative/data-feeds-01.txt
      workflow: none
      expected_trigger: "no"
    metadata:
      workflow: none
      category: trigger-negative
      smoke: true
    assert: *trigger_negative_asserts
